workflows:
  android-workflow:
    name: WISP Monitor Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Generate Android project files
        script: |
          flutter create --platforms=android .

      - name: Set Android permissions and config
        script: |
          # Use Python to safely modify AndroidManifest.xml (works on macOS & Linux)
          python3 << 'EOF'
          import re

          manifest_path = "android/app/src/main/AndroidManifest.xml"

          with open(manifest_path, "r") as f:
              content = f.read()

          permissions = """
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
          """

          # Insert permissions before <application
          content = content.replace("<application", permissions + "\n    <application", 1)

          with open(manifest_path, "w") as f:
              f.write(content)

          print("AndroidManifest.xml updated successfully")
          EOF

      - name: Set minimum SDK version
        script: |
          # Use Python to update minSdk in build.gradle or build.gradle.kts
          python3 << 'EOF'
          import os, re

          # Try build.gradle.kts first, then build.gradle
          for gradle_file in ["android/app/build.gradle.kts", "android/app/build.gradle"]:
              if os.path.exists(gradle_file):
                  with open(gradle_file, "r") as f:
                      content = f.read()

                  # Replace minSdk variations
                  content = re.sub(
                      r'minSdk\s*=\s*flutter\.minSdkVersion',
                      'minSdk = 21',
                      content
                  )
                  content = re.sub(
                      r'minSdkVersion\s+flutter\.minSdkVersion',
                      'minSdkVersion 21',
                      content
                  )

                  with open(gradle_file, "w") as f:
                      f.write(content)

                  print(f"Updated {gradle_file} - minSdk set to 21")
                  break
          EOF

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
